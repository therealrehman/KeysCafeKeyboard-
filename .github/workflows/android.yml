name: Build APK

on:
  push:
    branches: [ main, master, develop ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:  # Manual trigger button on GitHub

jobs:

  # ─────────────────────────────────────────
  # JOB 1: Debug APK (har push pe build hoga)
  # ─────────────────────────────────────────
  build-debug:
    name: Build Debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant Gradle permission
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: KeysCafe-Debug-APK
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 30

  # ─────────────────────────────────────────
  # JOB 2: Release APK (sirf tag push pe)
  # Example: git tag v1.0.0 && git push origin v1.0.0
  # ─────────────────────────────────────────
  build-release:
    name: Build & Release APK
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant Gradle permission
        run: chmod +x gradlew

      - name: Build Release APK (unsigned)
        run: ./gradlew assembleRelease --no-daemon --stacktrace

      # ── Agar keystore secrets set hain toh sign karega ──
      - name: Sign APK
        if: |
          secrets.SIGNING_KEY != '' &&
          secrets.ALIAS != '' &&
          secrets.KEY_STORE_PASSWORD != '' &&
          secrets.KEY_PASSWORD != ''
        uses: r0adkll/sign-android-release@v1
        id: sign_app
        with:
          releaseDirectory: app/build/outputs/apk/release
          signingKeyBase64: ${{ secrets.SIGNING_KEY }}
          alias: ${{ secrets.ALIAS }}
          keyStorePassword: ${{ secrets.KEY_STORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}

      # ── GitHub Release banao aur APK attach karo ──
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "KeysCafe Keyboard ${{ github.ref_name }}"
          body: |
            ## 🔥 KeysCafe Keyboard ${{ github.ref_name }}

            ### Download
            APK file neeche attached hai — seedha install kar sakte ho.

            ### Changelog
            ${{ github.event.head_commit.message }}
          files: |
            app/build/outputs/apk/release/*.apk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
